<!DOCTYPE html>
<html>
<head>
  <title>Security Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-[#0a0f1d] text-white font-[Satoshi]">

<header class="h-20 flex items-center justify-between px-8 border-b border-gray-800/50">
  <h1 class="text-xl font-bold">🔐 Security Dashboard</h1>
  <span class="text-green-400 text-sm">● System Secure</span>
</header>

<main class="p-8 max-w-7xl mx-auto space-y-6">

  <!-- PASSWORD -->
  <div class="glass-card rounded-2xl p-8">
    <h2 class="text-lg font-bold mb-4">Cipher Health Check</h2>

    <input 
      type="password" 
      id="password"
      placeholder="Enter password"
      class="w-full bg-[#0a0f1d] border border-[#3a4558] rounded-xl p-4 mb-4"
    />

    <button 
      onclick="analyzePassword()"
      class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg mb-4"
    >
      Analyze Password
    </button>

    <div class="w-full h-2 rounded mb-2 overflow-hidden">
      <div id="strength-bar" class="h-full w-0 transition-all duration-300"></div>
    </div>

    <p id="result" class="text-sm font-medium"></p>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- NETWORK -->
    <div class="glass-card rounded-2xl p-6">
      <h3 class="text-lg font-bold mb-4">Network Profile</h3>

      <p>IP: <span id="ip">Loading...</span></p>
      <p>Location: <span id="location"></span></p>
      <p>Browser: <span id="browser"></span></p>
    </div>

    <!-- ALERT -->
    <div class="glass-card rounded-2xl p-6">
      <h3 class="text-lg font-bold mb-4">Recent Activity</h3>
      <div id="activity-log" class="space-y-2 text-sm">
  <p class="text-gray-400">Initializing system...</p>
</div>
    </div>

  </div>

</main>

<script src="script.js"></script>
</body>
</html>
